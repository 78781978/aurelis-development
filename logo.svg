<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 260" role="img" aria-labelledby="logoTitle">
  <title id="logoTitle">Aurelis Development</title>
  <defs>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4FD1A0"/>
      <stop offset="100%" stop-color="#0E6B4C"/>
    </linearGradient>
    <linearGradient id="navyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2A4054"/>
      <stop offset="100%" stop-color="#16222C"/>
    </linearGradient>
  </defs>

  <!-- frame brackets -->
  <path d="M60 55 H210 M60 55 V95" stroke="#1E9C6B" stroke-width="2.5" fill="none"/>
  <path d="M580 55 H430 M580 55 V95" stroke="#1E9C6B" stroke-width="2.5" fill="none"/>

  <!-- skyline mark -->
  <g>
    <polygon points="205,150 265,80 265,150" fill="url(#greenGrad)"/>
    <polygon points="265,150 265,60 300,95 300,150" fill="url(#greenGrad)"/>
    <rect x="300" y="70" width="40" height="80" fill="url(#navyGrad)"/>
    <rect x="345" y="90" width="34" height="60" fill="url(#navyGrad)"/>
    <rect x="384" y="110" width="26" height="40" fill="url(#navyGrad)"/>
    <polygon points="205,155 410,155 320,168 205,158" fill="#16222C"/>
  </g>

  <!-- wordmark -->
  <text x="320" y="205" text-anchor="middle" font-family="'Montserrat', 'Poppins', Arial, sans-serif" font-size="54" letter-spacing="10" fill="#16222C" font-weight="600">AURELIS</text>
  <g>
    <line x1="140" y1="232" x2="255" y2="232" stroke="#1E9C6B" stroke-width="1.5"/>
    <text x="320" y="238" text-anchor="middle" font-family="'Montserrat', 'Poppins', Arial, sans-serif" font-size="20" letter-spacing="6" fill="#1E9C6B" font-weight="500">DEVELOPMENT</text>
    <line x1="385" y1="232" x2="500" y2="232" stroke="#1E9C6B" stroke-width="1.5"/>
  </g>
</svg>
