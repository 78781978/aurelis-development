<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" role="img" aria-labelledby="logoTitle">
  <title id="logoTitle">Aurelis Development</title>
  <defs>
    <linearGradient id="markGrad" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#3FBE8A"/>
      <stop offset="55%" stop-color="#1E9C6B"/>
      <stop offset="100%" stop-color="#16222C"/>
    </linearGradient>
  </defs>

  <!-- triangular mark -->
  <polygon points="150,18 262,230 38,230" fill="url(#markGrad)"/>

  <!-- mini skyline cut-out inside the mark -->
  <rect x="112" y="180" width="20" height="50" fill="#16222C"/>
  <rect x="140" y="150" width="20" height="80" fill="#16222C"/>
  <rect x="168" y="168" width="20" height="62" fill="#16222C"/>

  <!-- divider -->
  <rect x="304" y="35" width="4" height="190" fill="#16222C"/>

  <!-- wordmark -->
  <text x="334" y="148" font-family="'Montserrat', 'Poppins', Arial, sans-serif" font-size="76" letter-spacing="7" fill="#16222C" font-weight="700">AURELIS</text>
  <text x="336" y="204" font-family="'Montserrat', 'Poppins', Arial, sans-serif" font-size="32" letter-spacing="9" fill="#1E9C6B" font-weight="600">DEVELOPMENT</text>
</svg>
